<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generate EMMA Ecosystem PowerPoint</title>
  <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #0a0a1a; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .container { text-align: center; max-width: 600px; }
    h1 { font-size: 2rem; margin-bottom: 8px; }
    p { color: #aaa; margin-bottom: 32px; }
    button { padding: 16px 48px; font-size: 1.1rem; font-weight: 700; background: linear-gradient(135deg, #004684, #005a9e); color: #FDB927; border: 2px solid #FDB927; border-radius: 12px; cursor: pointer; transition: all 0.3s; }
    button:hover { background: #FDB927; color: #004684; transform: scale(1.05); }
    .status { margin-top: 20px; color: #4ade80; font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="container">
  <h1>🎓 EMMA Ecosystem Pitch Deck</h1>
  <p>Official NC A&T Branded PowerPoint — 10 Slides</p>
  <button onclick="generatePPTX()">⬇️ Generate & Download .pptx</button>
  <div class="status" id="status"></div>
</div>

<script>
function generatePPTX() {
  document.getElementById('status').textContent = 'Building slides...';

  const pptx = new PptxGenJS();
  pptx.author = 'W. Chris Harrison';
  pptx.company = 'North Carolina Agricultural and Technical State University';
  pptx.title = 'EMMA Ecosystem — From Transcript to Transformation';
  pptx.subject = 'Provost Pitch — Experiential Learning Ecosystem';
  pptx.layout = 'LAYOUT_WIDE'; // 13.33 x 7.5

  // ═══════════════════════════════════════
  // NC A&T OFFICIAL BRAND COLORS
  // ═══════════════════════════════════════
  const AGGIE_BLUE = '004684';
  const AGGIE_GOLD = 'FDB927';
  const WHITE = 'FFFFFF';
  const DARK = '0a0e1a';
  const LIGHT_BG = 'F0F4F8';
  const DARK_BLUE = '002d56';
  const MID_BLUE = '005a9e';

  // ═══════════════════════════════════════
  // LAYOUT HELPERS
  // ═══════════════════════════════════════

  // 74.5-degree angled accent (signature NC A&T brand element)
  function addAngledAccent(slide, color = AGGIE_GOLD) {
    // Gold diagonal bar — mimics A&T's 74.5° angled texture
    slide.addShape(pptx.ShapeType.rtTriangle, {
      x: 10.5, y: 0, w: 2.83, h: 7.5,
      fill: { color: color, transparency: 85 },
      rotate: 0
    });
  }

  function addBrandFooter(slide, darkMode = false) {
    const bgColor = darkMode ? DARK_BLUE : AGGIE_BLUE;
    slide.addShape(pptx.ShapeType.rect, { x: 0, y: 6.9, w: 13.33, h: 0.6, fill: { color: bgColor } });
    // Gold top line on footer
    slide.addShape(pptx.ShapeType.rect, { x: 0, y: 6.88, w: 13.33, h: 0.03, fill: { color: AGGIE_GOLD } });
    slide.addText('NORTH CAROLINA AGRICULTURAL AND TECHNICAL STATE UNIVERSITY', {
      x: 0.5, y: 6.95, w: 8, h: 0.4,
      fontSize: 7.5, color: AGGIE_GOLD, fontFace: 'Calibri', align: 'left', letterSpacing: 3, bold: true
    });
    slide.addText('AGGIES DO.', {
      x: 10.5, y: 6.95, w: 2.5, h: 0.4,
      fontSize: 9, color: AGGIE_GOLD, fontFace: 'Calibri', align: 'right', bold: true, letterSpacing: 2
    });
  }

  function addGoldTopBar(slide) {
    slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 13.33, h: 0.06, fill: { color: AGGIE_GOLD } });
  }

  function addSlideNumber(slide, num, total) {
    slide.addText(`${num}`, {
      x: 12.3, y: 6.95, w: 0.7, h: 0.4,
      fontSize: 8, color: WHITE, fontFace: 'Calibri', align: 'center', transparency: 40
    });
  }

  // ═══════════════════════════════════════
  // SLIDE 1: TITLE
  // ═══════════════════════════════════════
  let slide = pptx.addSlide();
  slide.background = { fill: AGGIE_BLUE };
  addGoldTopBar(slide);
  addAngledAccent(slide, AGGIE_GOLD);

  // University name
  slide.addText('NORTH CAROLINA A&T STATE UNIVERSITY', {
    x: 0.8, y: 0.5, w: 10, h: 0.4,
    fontSize: 10, fontFace: 'Calibri', color: AGGIE_GOLD, bold: true, letterSpacing: 4
  });

  slide.addShape(pptx.ShapeType.rect, { x: 0.8, y: 1.0, w: 3.5, h: 0.04, fill: { color: AGGIE_GOLD } });

  slide.addText('From Transcript\nto Transformation', {
    x: 0.8, y: 1.4, w: 9, h: 2.8,
    fontSize: 48, fontFace: 'Calibri Light', color: WHITE, bold: true, lineSpacingMultiple: 1.05
  });

  slide.addText('The Experiential Learning Ecosystem', {
    x: 0.8, y: 4.0, w: 9, h: 0.6,
    fontSize: 20, fontFace: 'Calibri', color: AGGIE_GOLD, italic: true
  });

  slide.addShape(pptx.ShapeType.rect, { x: 0.8, y: 4.8, w: 2.5, h: 0.03, fill: { color: AGGIE_GOLD } });

  slide.addText('W. Chris Harrison\nDepartment of Natural Resources & Environmental Design\nCollege of Agriculture & Environmental Sciences', {
    x: 0.8, y: 5.1, w: 8, h: 1.2,
    fontSize: 12, fontFace: 'Calibri', color: WHITE, lineSpacingMultiple: 1.5, transparency: 15
  });

  slide.addText('thinkemma.app', {
    x: 0.8, y: 6.3, w: 3, h: 0.4,
    fontSize: 15, fontFace: 'Calibri', color: AGGIE_GOLD, bold: true
  });

  // Footer
  slide.addShape(pptx.ShapeType.rect, { x: 0, y: 6.9, w: 13.33, h: 0.6, fill: { color: DARK_BLUE } });
  slide.addShape(pptx.ShapeType.rect, { x: 0, y: 6.88, w: 13.33, h: 0.03, fill: { color: AGGIE_GOLD } });
  slide.addText('wcharris@ncat.edu', {
    x: 0.8, y: 6.95, w: 5, h: 0.4,
    fontSize: 9, color: AGGIE_GOLD, fontFace: 'Calibri', letterSpacing: 1
  });

  // ═══════════════════════════════════════
  // SLIDE 2: THE GAP
  // ═══════════════════════════════════════
  slide = pptx.addSlide();
  slide.background = { fill: DARK };
  addGoldTopBar(slide);
  addBrandFooter(slide, true);
  addSlideNumber(slide, 1, 8);
  addAngledAccent(slide, AGGIE_BLUE);

  slide.addText('THE GAP', {
    x: 0.8, y: 0.5, w: 10, h: 0.5,
    fontSize: 12, fontFace: 'Calibri', color: AGGIE_GOLD, bold: true, letterSpacing: 5
  });

  slide.addShape(pptx.ShapeType.rect, { x: 0.8, y: 1.1, w: 2, h: 0.03, fill: { color: AGGIE_GOLD } });

  slide.addText('"NC A&T has world-class programs\nacross nine colleges.\n\nBut no unified system to track\na student\'s experiential journey."', {
    x: 0.8, y: 1.5, w: 10, h: 3,
    fontSize: 30, fontFace: 'Calibri Light', color: WHITE, italic: true, lineSpacingMultiple: 1.25
  });

  slide.addText('Every college maps it differently. Every advisor tracks it differently.', {
    x: 0.8, y: 4.8, w: 10, h: 0.5,
    fontSize: 14, fontFace: 'Calibri', color: WHITE, transparency: 30
  });

  // Gold accent box
  slide.addShape(pptx.ShapeType.rect, { x: 0.8, y: 5.5, w: 8, h: 0.8, fill: { color: AGGIE_GOLD }, rectRadius: 0.05 });
  slide.addText('We built the system to fix that.', {
    x: 0.8, y: 5.5, w: 8, h: 0.8,
    fontSize: 22, fontFace: 'Calibri', color: AGGIE_BLUE, bold: true, align: 'center', valign: 'middle'
  });

  // ═══════════════════════════════════════
  // SLIDE 3: EMMA
  // ═══════════════════════════════════════
  slide = pptx.addSlide();
  slide.background = { fill: WHITE };
  addGoldTopBar(slide);
  addBrandFooter(slide);
  addSlideNumber(slide, 2, 8);

  // Blue left accent bar
  slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 0.15, h: 7.5, fill: { color: AGGIE_BLUE } });

  slide.addText('EMMA', {
    x: 0.6, y: 0.4, w: 3, h: 0.8,
    fontSize: 36, fontFace: 'Calibri', color: AGGIE_BLUE, bold: true
  });
  slide.addText('Experiential Major Mapping Assistant', {
    x: 3.2, y: 0.5, w: 7, h: 0.6,
    fontSize: 16, fontFace: 'Calibri', color: AGGIE_GOLD, italic: true
  });
  slide.addText('CURRICULUM-TO-CREDENTIALS ENGINE', {
    x: 0.6, y: 1.15, w: 10, h: 0.4,
    fontSize: 10, fontFace: 'Calibri', color: '888888', letterSpacing: 3
  });

  slide.addShape(pptx.ShapeType.rect, { x: 0.6, y: 1.6, w: 11, h: 0.02, fill: { color: AGGIE_GOLD } });

  const emmaPoints = [
    { text: '✦  Maps every milestone in a student\'s 4-year experiential journey', options: { fontSize: 15, color: '1a1a2e', bullet: false, spaceBefore: 14 } },
    { text: '✦  Real-time progress — courses, clubs, internships, capstones', options: { fontSize: 15, color: '1a1a2e', bullet: false, spaceBefore: 10 } },
    { text: '✦  Course data locked & verified from approved curriculum submissions', options: { fontSize: 15, color: '1a1a2e', bullet: false, spaceBefore: 10 } },
    { text: '✦  Field opportunities matched automatically from the ERP', options: { fontSize: 15, color: '1a1a2e', bullet: false, spaceBefore: 10 } },
    { text: '✦  Three role views — Student, Advisor, Administrator', options: { fontSize: 15, color: '1a1a2e', bullet: false, spaceBefore: 10 } },
    { text: '✦  White-label: swap one data file → any program, any college', options: { fontSize: 15, color: AGGIE_BLUE, bold: true, bullet: false, spaceBefore: 16 } },
  ];
  slide.addText(emmaPoints, { x: 0.6, y: 1.9, w: 11, h: 4, fontFace: 'Calibri', lineSpacingMultiple: 1.2 });

  slide.addText('thinkemma.app', {
    x: 0.6, y: 6.1, w: 3, h: 0.5,
    fontSize: 16, fontFace: 'Calibri', color: AGGIE_BLUE, bold: true
  });

  // ═══════════════════════════════════════
  // SLIDE 4: ISLA
  // ═══════════════════════════════════════
  slide = pptx.addSlide();
  slide.background = { fill: WHITE };
  addGoldTopBar(slide);
  addBrandFooter(slide);
  addSlideNumber(slide, 3, 8);
  slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 0.15, h: 7.5, fill: { color: AGGIE_BLUE } });

  slide.addText('ISLA', {
    x: 0.6, y: 0.4, w: 3, h: 0.8,
    fontSize: 36, fontFace: 'Calibri', color: AGGIE_BLUE, bold: true
  });
  slide.addText('Interactive Study & Licensure Assistant', {
    x: 2.8, y: 0.5, w: 8, h: 0.6,
    fontSize: 16, fontFace: 'Calibri', color: AGGIE_GOLD, italic: true
  });
  slide.addText('UNIVERSAL CREDENTIALING ENGINE', {
    x: 0.6, y: 1.15, w: 10, h: 0.4,
    fontSize: 10, fontFace: 'Calibri', color: '888888', letterSpacing: 3
  });

  slide.addShape(pptx.ShapeType.rect, { x: 0.6, y: 1.6, w: 11, h: 0.02, fill: { color: AGGIE_GOLD } });

  const islaPoints = [
    { text: '✦  Tracks whether students have MASTERED each domain — not just enrolled', options: { fontSize: 15, color: '1a1a2e', bullet: false, spaceBefore: 14 } },
    { text: '✦  Gauges update automatically as milestones are completed in EMMA', options: { fontSize: 15, color: '1a1a2e', bullet: false, spaceBefore: 10 } },
    { text: '✦  Exam standards & accreditation requirements pulled from the ERP', options: { fontSize: 15, color: '1a1a2e', bullet: false, spaceBefore: 10 } },
    { text: '✦  Verified mastery writes back to the ERP as permanent record', options: { fontSize: 15, color: '1a1a2e', bullet: false, spaceBefore: 10 } },
    { text: '✦  Adapts to EVERY professional exam:', options: { fontSize: 15, color: '1a1a2e', bullet: false, spaceBefore: 10 } },
    { text: '       LARE  •  NCLEX  •  FE  •  CPA  •  Praxis  •  Any Exam', options: { fontSize: 14, color: AGGIE_BLUE, bold: true, bullet: false, spaceBefore: 4 } },
  ];
  slide.addText(islaPoints, { x: 0.6, y: 1.9, w: 11, h: 3.5, fontFace: 'Calibri', lineSpacingMultiple: 1.2 });

  // Quote box
  slide.addShape(pptx.ShapeType.rect, { x: 1.5, y: 5.5, w: 9, h: 1.0, fill: { color: AGGIE_BLUE }, rectRadius: 0.08 });
  slide.addText('"Mastery is expressed, not assumed."', {
    x: 1.5, y: 5.5, w: 9, h: 1.0,
    fontSize: 22, fontFace: 'Calibri', color: AGGIE_GOLD, bold: true, italic: true, align: 'center', valign: 'middle'
  });

  // ═══════════════════════════════════════
  // SLIDE 5: THE ERP
  // ═══════════════════════════════════════
  slide = pptx.addSlide();
  slide.background = { fill: AGGIE_BLUE };
  addGoldTopBar(slide);
  addAngledAccent(slide, DARK_BLUE);

  // Footer
  slide.addShape(pptx.ShapeType.rect, { x: 0, y: 6.9, w: 13.33, h: 0.6, fill: { color: DARK_BLUE } });
  slide.addShape(pptx.ShapeType.rect, { x: 0, y: 6.88, w: 13.33, h: 0.03, fill: { color: AGGIE_GOLD } });
  slide.addText('SAFE  •  SECURE  •  ALREADY IN PLACE', {
    x: 0.5, y: 6.95, w: 12, h: 0.4,
    fontSize: 9, color: AGGIE_GOLD, fontFace: 'Calibri', align: 'center', letterSpacing: 4, bold: true
  });

  slide.addText('THE ERP', {
    x: 0.8, y: 0.4, w: 10, h: 0.5,
    fontSize: 12, fontFace: 'Calibri', color: AGGIE_GOLD, bold: true, letterSpacing: 5
  });

  slide.addShape(pptx.ShapeType.rect, { x: 0.8, y: 1.0, w: 3, h: 0.03, fill: { color: AGGIE_GOLD } });

  slide.addText('Enterprise Resource\nPlanning System', {
    x: 0.8, y: 1.2, w: 10, h: 1.2,
    fontSize: 32, fontFace: 'Calibri Light', color: WHITE, lineSpacingMultiple: 1.1
  });
  slide.addText('THE INSTITUTIONAL BACKBONE', {
    x: 0.8, y: 2.3, w: 10, h: 0.4,
    fontSize: 11, fontFace: 'Calibri', color: AGGIE_GOLD, letterSpacing: 3, bold: true
  });

  slide.addText('A digital library that feeds its information\nto every app — and every app writes back.', {
    x: 0.8, y: 2.9, w: 10, h: 0.9,
    fontSize: 17, fontFace: 'Calibri', color: WHITE, italic: true, lineSpacingMultiple: 1.4, transparency: 10
  });

  // What the ERP holds — left column
  const erpItems = ['📄 Publications', '👤 Personnel Profiles', '📋 Project Records', '📦 Resource Collections', '📐 Exam Standards', '🏛️ All University Data'];
  erpItems.forEach((item, i) => {
    slide.addText(item, {
      x: 0.8, y: 4.0 + (i * 0.4), w: 4.5, h: 0.38,
      fontSize: 13, fontFace: 'Calibri', color: WHITE
    });
  });

  // Bidirectional flow — right column
  slide.addShape(pptx.ShapeType.rect, { x: 6.5, y: 3.8, w: 5.5, h: 0.45, fill: { color: AGGIE_GOLD }, rectRadius: 0.05 });
  slide.addText('READS ←  ERP  → WRITES', {
    x: 6.5, y: 3.8, w: 5.5, h: 0.45,
    fontSize: 11, fontFace: 'Calibri', color: AGGIE_BLUE, bold: true, align: 'center', valign: 'middle', letterSpacing: 2
  });

  const flows = [
    { app: 'EMMA', reads: '← Milestones & courses', writes: 'Student progress →' },
    { app: 'ISLA', reads: '← Exam standards', writes: 'Verified mastery →' },
    { app: 'AVA', reads: '← Site data', writes: 'Design layers →' },
    { app: 'GRANT', reads: '← Project records', writes: 'Funded proposals →' },
  ];

  flows.forEach((f, i) => {
    const y = 4.4 + (i * 0.55);
    slide.addShape(pptx.ShapeType.rect, { x: 6.5, y: y, w: 5.5, h: 0.45, fill: { color: MID_BLUE }, rectRadius: 0.05 });
    slide.addText(f.app, { x: 6.6, y: y, w: 1.0, h: 0.45, fontSize: 12, fontFace: 'Calibri', color: AGGIE_GOLD, bold: true, valign: 'middle' });
    slide.addText(f.reads, { x: 7.6, y: y, w: 2.2, h: 0.45, fontSize: 10, fontFace: 'Calibri', color: WHITE, valign: 'middle' });
    slide.addText(f.writes, { x: 9.8, y: y, w: 2.1, h: 0.45, fontSize: 10, fontFace: 'Calibri', color: WHITE, valign: 'middle', align: 'right' });
  });

  // ═══════════════════════════════════════
  // SLIDE 6: ATCS
  // ═══════════════════════════════════════
  slide = pptx.addSlide();
  slide.background = { fill: WHITE };
  addGoldTopBar(slide);
  addBrandFooter(slide);
  addSlideNumber(slide, 4, 8);
  slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 0.15, h: 7.5, fill: { color: AGGIE_BLUE } });

  slide.addText('ATCS', {
    x: 0.6, y: 0.4, w: 3, h: 0.8,
    fontSize: 36, fontFace: 'Calibri', color: AGGIE_BLUE, bold: true
  });
  slide.addText('Agriculture, Technology & Community Studio', {
    x: 0.6, y: 1.1, w: 10, h: 0.5,
    fontSize: 16, fontFace: 'Calibri', color: AGGIE_GOLD, italic: true
  });
  slide.addText('WITHIN THE SMALL FARM RESEARCH & INNOVATION CENTER', {
    x: 0.6, y: 1.6, w: 10, h: 0.4,
    fontSize: 10, fontFace: 'Calibri', color: '888888', letterSpacing: 2
  });

  slide.addShape(pptx.ShapeType.rect, { x: 0.6, y: 2.1, w: 11, h: 0.02, fill: { color: AGGIE_GOLD } });

  slide.addText('Opens the farm to every college.', {
    x: 0.6, y: 2.3, w: 10, h: 0.6,
    fontSize: 22, fontFace: 'Calibri Light', color: AGGIE_BLUE, italic: true
  });

  const atcsItems = [
    { emoji: '⚙️', college: 'Engineering', action: 'students survey the land' },
    { emoji: '📊', college: 'Business & Economics', action: 'students model the economics' },
    { emoji: '🎨', college: 'Design', action: 'students visualize the future' },
    { emoji: '🌱', college: 'Agriculture & Env. Sciences', action: 'students cultivate innovation' },
    { emoji: '💻', college: 'Science & Technology', action: 'students build the systems' },
    { emoji: '🏥', college: 'Health & Human Sciences', action: 'students assess wellness impact' },
    { emoji: '🤝', college: 'Community', action: 'gains the wealth' },
  ];

  atcsItems.forEach((item, i) => {
    const y = 3.0 + (i * 0.5);
    slide.addShape(pptx.ShapeType.rect, { x: 0.6, y: y, w: 11, h: 0.42, fill: { color: i % 2 === 0 ? LIGHT_BG : WHITE }, rectRadius: 0.05 });
    slide.addText(`${item.emoji}  ${item.college}`, { x: 0.8, y: y, w: 4.5, h: 0.42, fontSize: 14, fontFace: 'Calibri', color: AGGIE_BLUE, bold: true, valign: 'middle' });
    slide.addText(item.action, { x: 5.5, y: y, w: 5.5, h: 0.42, fontSize: 14, fontFace: 'Calibri', color: '444444', valign: 'middle' });
  });

  // ═══════════════════════════════════════
  // SLIDE 7: AVA
  // ═══════════════════════════════════════
  slide = pptx.addSlide();
  slide.background = { fill: WHITE };
  addGoldTopBar(slide);
  addBrandFooter(slide);
  addSlideNumber(slide, 5, 8);
  slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 0.15, h: 7.5, fill: { color: AGGIE_BLUE } });

  slide.addText('AVA', {
    x: 0.6, y: 0.4, w: 3, h: 0.8,
    fontSize: 36, fontFace: 'Calibri', color: AGGIE_BLUE, bold: true
  });
  slide.addText('Aggie Virtual Architect', {
    x: 2.7, y: 0.5, w: 7, h: 0.6,
    fontSize: 16, fontFace: 'Calibri', color: AGGIE_GOLD, italic: true
  });
  slide.addText('DIGITAL TWIN & VISUALIZATION ENGINE', {
    x: 0.6, y: 1.15, w: 10, h: 0.4,
    fontSize: 10, fontFace: 'Calibri', color: '888888', letterSpacing: 3
  });

  slide.addShape(pptx.ShapeType.rect, { x: 0.6, y: 1.6, w: 11, h: 0.02, fill: { color: AGGIE_GOLD } });

  const avaPoints = [
    { text: '✦  Where student work becomes VISIBLE', options: { fontSize: 15, color: '1a1a2e', bullet: false, spaceBefore: 14 } },
    { text: '✦  Digital twin powered by AI + geospatial data', options: { fontSize: 15, color: '1a1a2e', bullet: false, spaceBefore: 10 } },
    { text: '✦  Student designs become permanent layers in the digital twin', options: { fontSize: 15, color: '1a1a2e', bullet: false, spaceBefore: 10 } },
    { text: '✦  Portfolio that lives beyond graduation', options: { fontSize: 15, color: '1a1a2e', bullet: false, spaceBefore: 10 } },
    { text: '✦  Reads site data from ERP — writes design layers back', options: { fontSize: 15, color: '1a1a2e', bullet: false, spaceBefore: 10 } },
  ];
  slide.addText(avaPoints, { x: 0.6, y: 1.9, w: 11, h: 3, fontFace: 'Calibri', lineSpacingMultiple: 1.2 });

  // ═══════════════════════════════════════
  // SLIDE 8: GRANT
  // ═══════════════════════════════════════
  slide = pptx.addSlide();
  slide.background = { fill: WHITE };
  addGoldTopBar(slide);
  addBrandFooter(slide);
  addSlideNumber(slide, 6, 8);
  slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 0.15, h: 7.5, fill: { color: AGGIE_BLUE } });

  slide.addText('GRANT', {
    x: 0.6, y: 0.4, w: 4, h: 0.8,
    fontSize: 36, fontFace: 'Calibri', color: AGGIE_BLUE, bold: true
  });
  slide.addText('Grant Research & Award Navigation Technology', {
    x: 0.6, y: 1.1, w: 10, h: 0.5,
    fontSize: 16, fontFace: 'Calibri', color: AGGIE_GOLD, italic: true
  });
  slide.addText('FUNDING LIFECYCLE MANAGEMENT', {
    x: 0.6, y: 1.55, w: 10, h: 0.4,
    fontSize: 10, fontFace: 'Calibri', color: '888888', letterSpacing: 3
